name: Auto Scrape Web & Update Nursery DB

on:
  schedule:
    # 每天北京时间中午 12:00（UTC时间 4:00）自动爬取网页
    - cron: '0 4 * * *'
  workflow_dispatch: # 允许网页端手动一键点击触发

# 🔐 添加防锁冲突控制：使用相同的 group 名字，确保与邮件解析排队隔离
concurrency:
  group: db-update-group
  cancel-in-progress: false

jobs:
  scrape-and-db:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python Dependencies
      run: |
        pip install --upgrade pip
        pip install pandas requests beautifulsoup4 openpyxl

    - name: Run Web Scraper
      run: python web_scraper_pipeline.py

    - name: Commit and Push Database Update
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "action@github.com"
        git add nursery_quotes.db || true
        git diff-index --quiet HEAD || git commit -m "Auto-scrape web to database [skip ci]"
        git push || echo "No new database changes to push."
