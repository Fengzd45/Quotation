name: Auto Parse Email Quotes

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch: # 允许手动一键点击触发

# 🔐 使用独立的并发控制，不与爬虫冲突，不卡死
concurrency:
  group: email-parse-group
  cancel-in-progress: false

jobs:
  parse-and-db:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies for OCR
      # 💡 修复核心：换成全新系统支持的 libgl1 和 libglib2.0 依赖库，彻底解决找不到包的问题
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1 libglib2.0-0 libgomp1

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        # 💡 这里我们继续使用好安装、资源占用少的 easyocr，并在后面补上 pdfplumber 库名的正确写法
        pip install pandas openpyxl pdfplumber requests beautifulsoup4 pillow easyocr

    - name: Run Auto Email Parser
      env:
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        # 💡 检查这里：确保您的密码密文名字与仓库 Settings-Secrets 里配置的完全一致
        GMAIL_PASS: ${{ secrets.SENDER_APP_PASS }}
      run: python mail_to_db_pipeline.py

    - name: Commit and Push Database & JSON Updates
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "action@github.com"
        
        git add nursery_quotes.db quotes.json || true
        
        git diff-index --quiet HEAD || git commit -m "Auto-parse email with OCR and refresh dashboard"
        git push origin HEAD:main
